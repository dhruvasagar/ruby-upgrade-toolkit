name: Ruby Upgrade CI
# Template: Copy to your app's .github/workflows/ and adjust the ruby-version matrix.
# Runs on upgrade branches to catch regressions and deprecation warnings.
#
# Jobs:
#   test             — always runs; works for plain Ruby and Rails projects
#   rails-test       — only runs when config/application.rb is present (Rails projects)
#   migration-safety — only runs when db/migrate/ is present

on:
  push:
    branches: ['ruby-upgrade-*', 'rails-upgrade-*', 'upgrade/*']
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Adjust to the Ruby versions relevant to your upgrade path
        ruby-version: ['3.2', '3.3', '3.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Check Ruby deprecation warnings
        run: |
          COUNT=$(RUBYOPT="-W:deprecated" bundle exec ruby -e "require 'bundler/setup'" 2>&1 | grep -c "warning:" || true)
          echo "Ruby deprecation warnings: $COUNT"

      - name: Run tests
        run: |
          if [[ -d "spec" ]]; then
            bundle exec rspec --format progress
          else
            bundle exec rake test
          fi

  check-project:
    runs-on: ubuntu-latest
    outputs:
      is-rails: ${{ steps.detect.outputs.is-rails }}
      has-migrations: ${{ steps.detect.outputs.has-migrations }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          [ -f config/application.rb ] && echo "is-rails=true" >> "$GITHUB_OUTPUT" || echo "is-rails=false" >> "$GITHUB_OUTPUT"
          [ -d db/migrate ] && echo "has-migrations=true" >> "$GITHUB_OUTPUT" || echo "has-migrations=false" >> "$GITHUB_OUTPUT"

  rails-test:
    needs: check-project
    runs-on: ubuntu-latest
    # Only runs when this is a Rails project
    if: needs.check-project.outputs.is-rails == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    strategy:
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
        run: bundle exec rails db:create db:schema:load

      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check

      - name: Count deprecation warnings
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
        run: |
          COUNT=$(bundle exec rspec --no-color 2>&1 | grep -c "DEPRECATION" || true)
          echo "Deprecation warnings: $COUNT"
          if [ "${COUNT:-0}" -gt "0" ]; then
            bundle exec rspec --no-color 2>&1 | grep "DEPRECATION" | sort | uniq -c | sort -rn
          fi

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
        run: bundle exec rspec --format progress

  migration-safety:
    needs: check-project
    runs-on: ubuntu-latest
    # Only runs when db/migrate/ is present
    if: needs.check-project.outputs.has-migrations == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Scan for risky migration patterns
        run: |
          echo "=== Risky Migration Pattern Counts ==="
          echo "execute(): $(grep -rEn '^ *execute ' db/migrate/ --include='*.rb' 2>/dev/null | wc -l)"
          echo "drop_table: $(grep -rn 'drop_table' db/migrate/ --include='*.rb' 2>/dev/null | wc -l)"
          echo "remove_column: $(grep -rn 'remove_column' db/migrate/ --include='*.rb' 2>/dev/null | wc -l)"
          echo "add_index (non-concurrent): $(grep -rEn 'add_index' db/migrate/ --include='*.rb' 2>/dev/null | grep -v concurrently | wc -l)"
